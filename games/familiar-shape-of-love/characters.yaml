characters:
  protagonist:
    color: "#333333"
    name:
      en: "You"
      ja: "あなた"
    description:
      en: "The player's point of view. Unnamed by design, so the reader's own quiet distance from Kaede stays theirs."
      ja: "プレイヤー視点のキャラクター。意図的に名前を持たせず、楓との距離をプレイヤー自身のものとして感じられるようにする。"

  kaede:
    color: "#c97b8f"
    archetype:
      en: "The Gentle Childhood Friend"
      ja: "優しい幼馴染"
    name:
      en: "Kaede"
      ja: "楓"
    description:
      en: "Lives next door and has known the protagonist since before either of them can remember. Wakes him up when he oversleeps, splits her lunch with him without asking, worries out loud about things that technically aren't her business. The most natural, unguarded relationship he has — which is exactly why neither of them has ever called it anything more."
      ja: "隣の家に住み、物心つく前から主人公を知っている幼馴染。寝坊すれば起こしにきて、頼んでもいないのに弁当を分けてくれて、放っておけばいいことにまで口を出す。主人公にとって最も自然体でいられる相手——だからこそ、二人はそれにまだ名前をつけたことがない。"
