name: web-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # `npm run build` は story:check / story:compile を含むため、
      # tsumugai CLI(Rust製)のインストールが必要
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          # scripts/compile-story.ts はNodeネイティブのTypeScript実行に依存する
          # (Node 22.6+で導入。20では `ERR_UNKNOWN_FILE_EXTENSION` になる)。
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run tools:install
      - run: npm run check
      - run: npm run test
      - run: npm run build
