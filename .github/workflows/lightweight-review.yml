name: lightweight-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: lightweight-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: lightweight review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run lightweight review checks
        id: review
        shell: bash
        run: ./scripts/lightweight-review.sh

      - name: Comment review summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const marker = "<!-- lightweight-review -->";
            const reportPath = ".review/lightweight-review.md";
            const report = fs.existsSync(reportPath)
              ? fs.readFileSync(reportPath, "utf8")
              : "軽量レビューのレポート生成に失敗しました。Actionsログを確認してください。";

            const body = `${marker}\n${report}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const previous = comments.find((comment) =>
              comment.user.type === "Bot" && comment.body?.includes(marker)
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
