name: scenario-check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  story-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          # scripts/compile-story.ts はNodeネイティブのTypeScript実行に依存する
          # (Node 22.6+で導入。20では `ERR_UNKNOWN_FILE_EXTENSION` になる)。
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run tools:install
      - run: npm run story:check
      - run: npm run story:compile

  textlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run textlint
