name: game-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e

  build-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # ティラノスクリプトはビルド工程を持たないため、配布物はリポジトリの
      # index.html + tyrano/ + data/ をそのままzip化する(itch.io要件:
      # zipルート直下にindex.html)
      - run: zip -rX a-familiar-shape-of-love-web.zip index.html tyrano data LICENCE.txt -x '*._*' '._*'
      - uses: actions/upload-artifact@v4
        with:
          name: itch-io-zip
          path: a-familiar-shape-of-love-web.zip
